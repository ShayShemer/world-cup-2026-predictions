server {
    listen 80;

    # Serve static files from this folder
    root /usr/share/nginx/html;
    index index.html;

    # For any unknown path, serve index.html (needed for single-page apps)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* requests to the api-service container
    # Inside Docker, "api-service" resolves to the correct container IP
    location /api/ {
        proxy_pass http://api-service:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
